<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template 03 - “星光收集”探险地图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css" />
    <style>
        @page { size: A4; margin: 0; }
        body { font-family: "LXGW WenKai", sans-serif; background-color: #e5e5e5; display: flex; justify-content: center; padding: 2rem 0; }
        .a4-paper { width: 210mm; height: 297mm; background-color: #FDFBF7; position: relative; overflow: hidden; box-sizing: border-box; padding: 15mm 20mm; display: flex; flex-direction: column; }
        @media print {
            body { background-color: #FDFBF7; padding: 0; }
            .a4-paper { box-shadow: none; width: 100%; height: 100%; }
            .no-print { display: none !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
        
        /* 寻宝图专属样式 */
        .step-circle {
            width: 48px; height: 48px;
            border: 1.5px dashed #D4C9B3;
            border-radius: 50%;
            background-color: white;
            display: flex; align-items: center; justify-content: center;
            font-family: sans-serif; font-size: 15px; color: #BDBDBD; letter-spacing: 0.05em;
            position: relative; z-index: 10;
        }
        .path-line {
            flex-grow: 1; height: 2px;
            border-bottom: 1.5px dashed #D4C9B3;
            margin: 0 5px;
        }
        .turn-right {
            width: 2px; height: 35px;
            border-right: 1.5px dashed #D4C9B3;
            margin-right: 23px;
        }
        .turn-left {
            width: 2px; height: 35px;
            border-left: 1.5px dashed #D4C9B3;
            margin-left: 23px;
        }
        .fill-line { display: inline-block; border-bottom: 1px solid #888888; width: 200px; margin: 0 10px; }
        
        /* 特殊节点样式 */
        .milestone-circle {
            background-color: #FAF9F5;
            border: 1.5px solid #D4C9B3;
            color: #8BA88E;
        }
        .final-circle {
            border: 2px solid #E8B4BC;
            color: #E8B4BC;
            font-weight: 600;
            background-color: #FDFBF7;
        }
    </style>
</head>
<body>
    <div class="no-print fixed top-6 right-6 z-50">
        <button onclick="window.print()" class="bg-[#D4C9B3] text-[#4A4A4A] px-6 py-3 rounded-full shadow-lg hover:-translate-y-1 transition-all flex items-center gap-2 text-sm tracking-widest">
            <span>🖨️ 立即打印探险图</span>
        </button>
    </div>

    <div class="a4-paper">
        <div class="flex justify-between items-end mb-8 border-b border-[#4A4A4A]/30 pb-5">
            <div>
                <span class="text-[#D4C9B3] text-xs tracking-widest uppercase font-sans">Template 03 / Starlight Collection</span>
                <h1 class="text-3xl text-[#4A4A4A] mt-3 tracking-wide font-medium">“星光收集”探险地图</h1>
            </div>
            <div class="text-[#888888] text-[15px] tracking-widest">
                探索者：<span class="inline-block w-28 border-b border-[#888888]/50"></span>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl border border-[#D4C9B3]/40 mb-12 text-[#5C5C5C] text-[17px] leading-loose shadow-sm relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 h-full bg-[#D4C9B3]/50"></div>
            <div class="mb-4 tracking-wide">
                <span class="text-[#888888] font-sans mr-2">01.</span>
                <strong>这次探险，我要解锁的新技能是：</strong>
                <span class="fill-line" style="width: 320px;"></span>
            </div>
            <div class="mb-3 tracking-wide">
                <span class="text-[#888888] font-sans mr-2">02.</span>
                <strong>当收集满三十块星光，我可以开启的宝藏是：</strong>
                <span class="fill-line" style="width: 260px;"></span>
            </div>
            <p class="text-[13px] text-[#A1A1A1] mt-5 tracking-widest border-t border-[#F4F2EE] pt-3">
                注：星光能量只增不减。今天如果在原地休息也没有关系，我们明天继续出发。
            </p>
        </div>

        <div class="flex-grow flex flex-col justify-center px-4 w-full max-w-3xl mx-auto">
            
            <div class="flex items-center w-full">
                <div class="text-[#BDBDBD] text-xs font-sans tracking-widest mr-4 uppercase">Start</div>
                <div class="step-circle">1</div><div class="path-line"></div>
                <div class="step-circle">2</div><div class="path-line"></div>
                <div class="step-circle">3</div><div class="path-line"></div>
                <div class="step-circle">4</div><div class="path-line"></div>
                <div class="step-circle">5</div><div class="path-line"></div>
                <div class="step-circle">6</div>
            </div>
            <div class="flex justify-end w-full"><div class="turn-right"></div></div>

            <div class="flex items-center w-full flex-row-reverse">
                <div class="step-circle">12</div><div class="path-line"></div>
                <div class="step-circle">11</div><div class="path-line"></div>
                <div class="step-circle milestone-circle">10</div><div class="path-line"></div>
                <div class="step-circle">9</div><div class="path-line"></div>
                <div class="step-circle">8</div><div class="path-line"></div>
                <div class="step-circle">7</div>
            </div>
            <div class="flex justify-start w-full"><div class="turn-left"></div></div>

            <div class="flex items-center w-full">
                <div class="step-circle">13</div><div class="path-line"></div>
                <div class="step-circle">14</div><div class="path-line"></div>
                <div class="step-circle bg-[#FFF6E5] border-none text-2xl shadow-sm">🏕️</div><div class="path-line"></div>
                <div class="step-circle">16</div><div class="path-line"></div>
                <div class="step-circle">17</div><div class="path-line"></div>
                <div class="step-circle">18</div>
            </div>
            <div class="flex justify-end w-full"><div class="turn-right"></div></div>

            <div class="flex items-center w-full flex-row-reverse">
                <div class="step-circle">24</div><div class="path-line"></div>
                <div class="step-circle">23</div><div class="path-line"></div>
                <div class="step-circle">22</div><div class="path-line"></div>
                <div class="step-circle">21</div><div class="path-line"></div>
                <div class="step-circle milestone-circle">20</div><div class="path-line"></div>
                <div class="step-circle">19</div>
            </div>
            <div class="flex justify-start w-full"><div class="turn-left"></div></div>

            <div class="flex items-center w-full">
                <div class="step-circle">25</div><div class="path-line"></div>
                <div class="step-circle">26</div><div class="path-line"></div>
                <div class="step-circle">27</div><div class="path-line"></div>
                <div class="step-circle">28</div><div class="path-line"></div>
                <div class="step-circle">29</div><div class="path-line"></div>
                <div class="step-circle final-circle">30</div>
                <span class="text-4xl ml-4 animate-bounce">🎁</span>
            </div>

        </div>

        <div class="mt-8 pt-6 border-t border-[#E1E8E0]/60 text-center">
            <p class="text-[#A1A1A1] tracking-widest text-[13px]">“不要寻找完美的表现，去寻找任何细微的进步。”</p>
        </div>
    </div>
</body>
</html>
