<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静音 - ADHD守护</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css" />
    <style>
        body {
            font-family: "LXGW WenKai", sans-serif;
            background-color: #F9F9F7;
            color: #4A4A4A;
        }
        body.is-loading .interactive-button {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        .welcome-text {
            letter-spacing: 0.15em; line-height: 2;
            animation: breathFadeIn 2.5s ease-out forwards;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 100px;
            overflow: hidden;
        }
        @keyframes breathFadeIn {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 0.6; transform: translateY(0); }
        }
        .welcome-text.dimmed { opacity: 0.2 !important; }
        .welcome-text.hidden-collapse { opacity: 0 !important; max-height: 0; margin-bottom: 0 !important; transform: translateY(-20px); }
        .whisper-input {
            background-color: #FFFFFF;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03);
            border: 1px solid transparent;
            outline: none;
            transition: all 1s ease-in-out;
        }
        .whisper-input::placeholder { color: #A1A1A1; font-weight: 300; letter-spacing: 0.05em; }
        .whisper-input:disabled { background-color: #FAF9F5; color: #888888; box-shadow: none; border: 1px solid #F4F2EE; }
        #submitArea { transition: all 1s ease; }
        .ai-response-area {
            max-height: 0; opacity: 0; overflow: hidden;
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ai-response-area.expanded {
            max-height: 2000px;
            opacity: 1; margin-top: 2rem;
        }
        .typing-cursor::after {
            content: '...';
            animation: pulse 1.5s infinite;
            color: #8BA88E;
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-16 px-6 sm:px-12 relative overflow-y-auto is-loading">

    <div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-[#F2E2DF]/20 to-transparent pointer-events-none"></div>

    <div class="w-full max-w-2xl mt-auto mb-auto transition-all duration-1000 flex flex-col" id="mainContainer">

        <div id="welcomeText" class="welcome-text text-center text-xl sm:text-2xl mb-12 sm:mb-16">
            <p>此刻，让世界静音。</p>
            <p>这里，只有你自己。</p>
        </div>

        <div class="relative w-full transition-transform duration-1000 ease-in-out" id="inputWrapper">
            <textarea id="diaryInput" rows="5"
                      class="whisper-input w-full rounded-[2rem] p-8 sm:p-12 text-[19px] text-[#5C5C5C] leading-loose resize-none pb-20"
                      placeholder="哪怕只是几个字也挺好的..."></textarea>

            <div class="absolute bottom-8 right-10 opacity-0 flex items-center gap-8" id="submitArea">
                <button id="saveBtn" onclick="saveSilently()" class="text-[#BDBDBD] hover:text-[#4A4A4A] transition-colors flex items-center gap-2 text-[13px] tracking-widest">
                    <span>默默封存</span>
                </button>
                <button id="submitBtn" onclick="startAIAnalysis()" class="text-[#8BA88E] hover:text-[#4A4A4A] transition-colors flex items-center gap-2 text-[15px] tracking-widest font-medium group">
                    <span id="btnText">听听回音</span>
                    <span id="btnArrow" class="text-lg group-hover:translate-x-1 transition-transform">→</span>
                </button>
            </div>
        </div>

        <div id="responseContainer" class="ai-response-area w-full">
            <div id="responseBox" class="bg-white rounded-3xl p-8 sm:p-12 border border-[#E1E8E0] shadow-sm relative">
                <div id="responseLabel" class="absolute top-8 left-8 flex items-center gap-2 hidden">
                    <div class="w-2 h-2 rounded-full bg-[#8BA88E] animate-pulse"></div>
                    <span class="text-[#8BA88E] text-xs tracking-widest">微光回信</span>
                </div>

                <div id="outputText" class="text-[#5C5C5C] leading-loose text-[17px] text-justify mt-8 whitespace-pre-wrap"></div>
            </div>

            <div class="mt-8 text-center opacity-0 transition-opacity duration-1000 flex items-center justify-center gap-6" id="bottomNav">
                 <a href="toolkit.html" class="text-xs text-[#8BA88E] tracking-widest hover:text-[#4A4A4A] transition-colors border-b border-[#8BA88E]/30 pb-1">
                    需要物理外挂？前往工具箱
                </a>
                <span class="text-xs text-[#8BA88E]/30">|</span>
                <button onclick="openProfileModal()" class="text-xs text-[#8BA88E] tracking-widest hover:text-[#4A4A4A] transition-colors border-b border-[#8BA88E]/30 pb-1">
                   孩子信息配置
                </button>
            </div>
        </div>
    </div>

    <div id="profileModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/20 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-[#FDFBF7] w-11/12 max-w-md rounded-3xl shadow-xl p-8 transform scale-95 transition-transform duration-300" id="profileCard">
            <h2 class="text-xl font-medium text-[#4A4A4A] mb-2">配置孩子信息</h2>
            <p class="text-sm text-[#888888] mb-6 leading-relaxed">为了让老师的分析更精准，请简单设置一下孩子的情况。信息仅保存在你的本地设备，绝对隐私。</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-[#888888] mb-1">孩子年龄</label>
                    <input type="number" id="childAge" placeholder="例如：14" class="w-full bg-white border border-[#E1E8E0] rounded-xl px-4 py-2.5 text-[#4A4A4A] focus:outline-none focus:ring-2 focus:ring-[#8BA88E]/50 transition-all">
                </div>
                <div>
                    <label class="block text-sm text-[#888888] mb-1">孩子性别</label>
                    <select id="childGender" class="w-full bg-white border border-[#E1E8E0] rounded-xl px-4 py-2.5 text-[#4A4A4A] focus:outline-none focus:ring-2 focus:ring-[#8BA88E]/50 transition-all">
                        <option value="男孩">男孩</option>
                        <option value="女孩">女孩</option>
                        <option value="不愿透露">不愿透露</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-[#888888] mb-1">主要困扰或确诊情况 (一句话概括)</label>
                    <input type="text" id="childDiagnosis" placeholder="如：ADHD伴随ODD，极度抗拒写作业" class="w-full bg-white border border-[#E1E8E0] rounded-xl px-4 py-2.5 text-[#4A4A4A] focus:outline-none focus:ring-2 focus:ring-[#8BA88E]/50 transition-all">
                </div>
            </div>
            <button onclick="saveProfileAndClose()" class="w-full mt-8 bg-[#8BA88E] text-white py-3 rounded-full font-medium tracking-wide hover:-translate-y-0.5 hover:shadow-lg hover:shadow-[#8BA88E]/20 transition-all duration-300">
                保存信息
            </button>
        </div>
    </div>

    <!-- 统一的、由JS动态渲染的用户状态容器 -->
    <div id="auth-status-container" class="absolute top-5 right-5 text-sm text-[#888] z-10"></div>

    <div id="toast" class="fixed top-10 transform -translate-y-full opacity-0 bg-[#3C3C3C] text-white px-6 py-3 rounded-full shadow-lg transition-all duration-500 z-50 pointer-events-none">
        提示信息
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script>
        // Your web app's Firebase configuration
        // 请替换为你的 Firebase 项目配置
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        let auth = null;
        let db = null;
        let currentUser = null; // Global variable to store current user

        try {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore(); // Assuming firestore might be used for user data/records
        } catch (e) {
            console.error("Firebase 初始化失败:", e);
            const container = document.getElementById('auth-status-container');
            if (container) {
                container.innerHTML = '<span style="color: #d93025;">Firebase 初始化错误，请检查配置。</span>';
            }
        }

        // Function to update the UI based on user login status
        function updateUIForUser(user) {
            const container = document.getElementById('auth-status-container');
            if (!container) return; // Ensure container exists

            // Clear previous content to avoid conflicts
            container.innerHTML = '';

            if (user) {
                // User is logged in
                container.innerHTML = `
                    <div class="relative">
                        <button class="flex items-center gap-1 text-[#888] hover:text-[#4A4A4A] transition-colors" onclick="toggleDropdown(event)">
                            <span>我的记录</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        <div id="user-dropdown" class="absolute right-0 mt-2 w-36 bg-white rounded-lg shadow-lg py-1 hidden">
                            <a href="#" class="block px-4 py-2 text-sm text-[#4A4A4A] hover:bg-gray-100" onclick="viewMyRecords(event)">查看记录</a>
                            <a href="#" class="block px-4 py-2 text-sm text-[#4A4A4A] hover:bg-gray-100" onclick="signOutUser(event)">退出登录</a>
                        </div>
                    </div>
                `;
            } else {
                // User is logged out
                container.innerHTML = `
                    <button onclick="signInWithGoogle()" class="text-[#888] hover:text-[#4A4A4A] transition-colors">登录 / 注册</button>
                `;
            }
        }

        // Function to handle Google Sign-In
        async function signInWithGoogle() {
            if (!auth) {
                showToast("登录服务未准备好，请稍后再试。");
                return;
            }
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithRedirect(provider);
            } catch (error) {
                console.error("Error during Google sign-in:", error);
                showToast("登录失败，请稍后再试。");
            }
        }

        // Function to handle sign-out
        async function signOutUser(event) {
            event.preventDefault(); // Prevent default link behavior
            if (!auth) {
                showToast("退出服务未准备好，请稍后再试。");
                return;
            }
            try {
                await auth.signOut();
                showToast("已退出登录。");
                // onAuthStateChanged listener will automatically call updateUIForUser
            } catch (error) {
                console.error("Error during sign-out:", error);
                showToast("退出登录失败。");
            }
        }

        // Dropdown toggle for "我的记录"
        function toggleDropdown(event) {
            event.stopPropagation(); // Prevent click from closing immediately
            const dropdown = document.getElementById('user-dropdown');
            if (dropdown) {
                dropdown.classList.toggle('hidden');
            }
        }

        // Close dropdown if clicked outside
        document.addEventListener('click', (event) => {
            const dropdown = document.getElementById('user-dropdown');
            const authButton = document.querySelector('#auth-status-container button'); // The button that opens the dropdown
            if (dropdown && !dropdown.contains(event.target) && (!authButton || !authButton.contains(event.target))) {
                dropdown.classList.add('hidden');
            }
        });

        // Placeholder for viewing records
        function viewMyRecords(event) {
            event.preventDefault();
            showToast("查看记录功能待开发...");
            // Here you would navigate to a page or open a modal to show user's saved records
        }

        // --- 统一的 UI 更新与全局状态解锁 ---
        function updateUIForUser(userOrState) {
            const container = document.getElementById('auth-status-container');
            if (!container) return;
            container.innerHTML = ''; // 强制清空

            if (userOrState === 'offline') {
                container.innerHTML = '<button onclick="signInWithGoogle()" class="cursor-pointer">我的记录 (离线)</button>';
            } else if (userOrState) {
                container.innerHTML = `
                    <div class="relative" id="user-menu-container">
                        <button id="userMenuBtn" class="cursor-pointer">我的记录 (已登录)</button>
                        <div id="userMenuDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-md shadow-xl z-20">
                            <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" onclick="viewMyRecords(event)">查看记录</a>
                            <button id="logoutBtnInsideMenu" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100">退出登录</button>
                        </div>
                    </div>
                `;
                const menuBtn = document.getElementById('userMenuBtn');
                if (menuBtn) menuBtn.addEventListener('click', () => document.getElementById('userMenuDropdown').classList.toggle('hidden'));
                const logoutBtn = document.getElementById('logoutBtnInsideMenu');
                if (logoutBtn) logoutBtn.addEventListener('click', () => auth.signOut());
                // 点击菜单外部关闭菜单
                document.addEventListener('click', (event) => {
                    const menuContainer = document.getElementById('user-menu-container');
                    if (menuContainer && !menuContainer.contains(event.target)) {
                        const dropdown = document.getElementById('userMenuDropdown');
                        if (dropdown) dropdown.classList.add('hidden');
                    }
                });
            } else {
                container.innerHTML = '<button onclick="signInWithGoogle()" class="cursor-pointer">我的记录</button>';
            }
            // 解锁全局UI
            document.body.classList.remove('is-loading');
        }

        // --- 核心鉴权逻辑 (带3秒超时) ---
        function setupAuthListener() {
            if (auth) {
                let authResponded = false;
                const authTimeout = setTimeout(() => {
                    if (!authResponded) {
                        console.warn("Firebase Auth 响应超时，进入离线模式。");
                        authResponded = true;
                        updateUIForUser('offline');
                    }
                }, 3000);

                auth.onAuthStateChanged(user => {
                    if (!authResponded) {
                        clearTimeout(authTimeout);
                        authResponded = true;
                    }
                    currentUser = user;
                    updateUIForUser(user);
                });
            } else {
                console.error('Firebase Auth unavailable.');
                updateUIForUser('offline');
            }
        }

        // Call the listener setup function after Firebase initialization attempt
        if (firebase.apps.length > 0) {
            setupAuthListener();
        } else {
            updateUIForUser('offline');
        }


        const input = document.getElementById('diaryInput');
        const welcome = document.getElementById('welcomeText');
        const submitArea = document.getElementById('submitArea');
        const submitBtn = document.getElementById('submitBtn');
        const saveBtn = document.getElementById('saveBtn');
        const btnText = document.getElementById('btnText');
        const btnArrow = document.getElementById('btnArrow');
        const responseContainer = document.getElementById('responseContainer');
        const responseBox = document.getElementById('responseBox');
        const responseLabel = document.getElementById('responseLabel');
        const outputText = document.getElementById('outputText');
        const mainContainer = document.getElementById('mainContainer');
        const bottomNav = document.getElementById('bottomNav');
        const profileModal = document.getElementById('profileModal');
        const profileCard = document.getElementById('profileCard');
        const toast = document.getElementById('toast');

        // --- 弹窗与提示 ---
        document.addEventListener('DOMContentLoaded', () => {
             const savedProfile = localStorage.getItem('child_profile');
             if (!savedProfile) { openProfileModal(); }
        });

        function openProfileModal() {
            const savedProfile = localStorage.getItem('child_profile');
            if (savedProfile) {
                try {
                    const profileData = JSON.parse(savedProfile);
                    document.getElementById('childAge').value = profileData.age || '';
                    document.getElementById('childGender').value = profileData.gender || '男孩';
                    document.getElementById('childDiagnosis').value = profileData.diagnosis || '';
                } catch(e) {
                    localStorage.removeItem('child_profile'); // 清除可能已损坏的旧格式数据
                }
            }
            profileModal.classList.remove('hidden');
            setTimeout(() => {
                profileModal.classList.remove('opacity-0');
                profileCard.classList.remove('scale-95');
            }, 10);
        }

        function saveProfileAndClose() {
             const profileData = {
                age: document.getElementById('childAge').value || '未知年龄',
                gender: document.getElementById('childGender').value,
                diagnosis: document.getElementById('childDiagnosis').value || '未填写具体特质'
             };
             localStorage.setItem('child_profile', JSON.stringify(profileData));

             profileModal.classList.add('opacity-0');
             profileCard.classList.add('scale-95');

             setTimeout(() => {
                 profileModal.classList.add('hidden');
                 showToast("孩子信息已安妥保存");
             }, 300);
        }

        function showToast(message) {
            toast.innerText = message;
            toast.style.transform = 'translateY(0)';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.transform = 'translateY(-100%)';
                toast.style.opacity = '0';
            }, 3000);
        }

        // 输入框交互
        input.addEventListener('focus', () => welcome.classList.add('dimmed'));
        input.addEventListener('blur', () => {
            if(input.value.trim() === '') welcome.classList.remove('dimmed');
        });
        input.addEventListener('input', () => {
            submitArea.style.opacity = input.value.trim().length > 0 ? '1' : '0';
        });

        // 通用的舞台变形逻辑 (纯视觉)
        function transformStage() {
            welcome.classList.add('hidden-collapse');
            mainContainer.classList.remove('mt-auto', 'mb-auto');
            mainContainer.classList.add('mt-12');
            responseContainer.classList.add('expanded');
        }

        function saveToLocal(text) {
            let diaries = JSON.parse(localStorage.getItem('adhd_diaries') || '[]' );
            diaries.push({ date: new Date().toISOString(), content: text });
            localStorage.setItem('adhd_diaries', JSON.stringify(diaries));
        }

        // --- 路线 1：默默封存 (不调用 AI) ---
        function saveSilently() {
            const userText = input.value.trim();
            if(!userText) return;
            saveToLocal(userText);
            transformStage();

            // Disable input and buttons
            input.disabled = true;
            submitBtn.disabled = true;
            saveBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            saveBtn.classList.add('opacity-50', 'cursor-not-allowed');
            submitArea.style.opacity = '0'; // Hide submit area
            setTimeout(() => submitArea.style.display = 'none', 1000); // Collapse after transition

            responseBox.classList.replace('border-[#E1E8E0]', 'border-[#F4F2EE]');
            responseBox.classList.replace('bg-white', 'bg-[#FAF9F5]');
            outputText.classList.add('text-center', 'text-[#888888]', 'tracking-widest');
            outputText.innerHTML = "情绪已安放。<br>没有评判，只有接纳。";

            setTimeout(() => {
                bottomNav.style.opacity = '1';
                // For silent save, we don't re-enable input/buttons or show submitArea
                // as the interaction is considered "done" for this entry.
            }, 800);
        }

        // --- 路线 2：触发 AI 分析 ---
        async function startAIAnalysis() {
            const userText = input.value.trim();
            if(!userText) return;

            saveToLocal(userText);
            transformStage(); // Visual transformation

            // Disable input and buttons immediately
            input.disabled = true;
            submitBtn.disabled = true;
            saveBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            saveBtn.classList.add('opacity-50', 'cursor-not-allowed');
            submitArea.style.opacity = '0'; // Hide submit area
            setTimeout(() => submitArea.style.display = 'none', 1000); // Collapse after transition

            responseLabel.classList.remove('hidden');
            outputText.classList.add('typing-cursor');
            outputText.innerHTML = ""; // Clear previous output

            await fetchDeepSeek(userText);
        }

        // --- 连接 DeepSeek ---
        async function fetchDeepSeek(text) {
            let profileString = "未知（请根据家长描述推测）";
            const savedProfile = localStorage.getItem('child_profile');
            if (savedProfile) {
                try {
                    const profileData = JSON.parse(savedProfile);
                    profileString = `${profileData.age}岁，${profileData.gender}。特质与困扰：${profileData.diagnosis}`;
                } catch(e) {
                    profileString = savedProfile; // 兼容旧的纯字符串格式
                }
            }
            const enrichedUserText = `【后台隐藏信息：孩子基本情况档案 -> ${profileString}】\n\n家长的今日描述：\n${text}`;

            const systemPrompt = `你是一位专注解决 ADHD/ASD 及 ODD 青少年行为问题的资深临床行为分析师。家长现在正处于高压、耗竭或权力斗争的旋涡中。你的回复必须专业、客观、极其克制，提供具有强支撑力的结构化分析，绝不能有“哄小宝宝”的幼稚感或空洞的安慰。

【🔴 强制格式与语调约束】
1. 绝对禁用 Markdown排版（如加粗、#号）、禁用列表序号（如1.2.3.或①②③）。用自然的段落过渡。
2. 绝对禁用客服套话、说教或废话（如“最后提醒”、“总之”、“希望能帮到你”、“这很正常”）。话说到具体的策略点立刻结束。
3. 语调要求：冷静、克制、一针见血。用平视的视角，像一位专业的心理督导在和家长复盘案例。

【💬 核心分析路径（自然融合到段落中）】
1. 锚定情绪与现状：用极简的一句话点出家长目前的耗竭状态或陷入的权力斗争，不加评判。
2. 剥离表象直击机制（认知重构）：这是你的核心价值！必须灵活运用以下神经科学比喻来打破家长的道德评判：
   - 动力系统：ADHD遵循“兴趣驱动型神经系统(NICUP)”。他不是懒，他的大脑需要“新奇、挑战、紧迫”这把钥匙才能启动。
   - 时间感知：他的时间观念像WiFi信号，离“现在”越近越强，离“未来”越远越弱（即“时间盲”）。
   - 工作记忆：他的工作记忆容量只有常人的六成。就像同时运行太多APP的旧手机，一转身就把你的指令当成后台程序“杀”了。
   - 情绪失控：他的前额叶发育比同龄人晚30%，情绪系统像一辆“没有减震器的汽车”，同样的颠簸会产生剧烈的弹跳。
3. 降维打击策略：提供 1 到 2 个极其具体的干预动作。引导家长放弃“灭火模式”，开启“陪烧模式”（身体在场、语言最小化）。对于青少年，强调建立边界、外部化执行功能（如环境减法）或退出权力斗争。

            const controller = new AbortController();
            const signal = controller.signal;
            const timeout = 3000; // 3 seconds timeout

            const timeoutId = setTimeout(() => {
                controller.abort(); // Abort the fetch request after timeout
            }, timeout);

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: enrichedUserText }
                        ],
                        stream: true
                    }),
                    signal: signal // Attach the abort signal
                });

                clearTimeout(timeoutId); // Clear the timeout if fetch completes successfully

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ message: '未知API错误' }));
                    throw new Error(`API错误: ${response.status} - ${errorData.message || response.statusText}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                outputText.innerHTML = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');

                    for (const line of lines) {
                        if (line.includes('[DONE]')) break;
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.choices[0].delta.content) {
                                    outputText.innerHTML += data.choices[0].delta.content;
                                }
                            } catch (e) {
                                console.warn("Error parsing chunk data:", e);
                            }
                        }
                    }
                }
            } catch (error) {
                clearTimeout(timeoutId); // Ensure timeout is cleared even on fetch error
                console.error("Fetch DeepSeek error:", error);
                if (error.name === 'AbortError') {
                    outputText.innerHTML = "抱歉，微光未能及时照达。AI响应超时，请稍后再试。";
                } else if (error.message.startsWith('API错误')) {
                    outputText.innerHTML = `抱歉，AI服务出现问题：${error.message}。请稍后再试。`;
                } else {
                    outputText.innerHTML = "抱歉，微光暂时未能照达。请检查网络连接或稍后再试。";
                }
            } finally {
                outputText.classList.remove('typing-cursor');
                bottomNav.style.opacity = '1';
                // Re-enable input and buttons
                input.disabled = false;
                submitBtn.disabled = false;
                saveBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                saveBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                // Re-show submit area if AI failed, so user can retry or save silently
                submitArea.style.display = 'flex'; // Make it visible again
                submitArea.style.opacity = '1'; // Fade it back in
            }
        }
    </script>
