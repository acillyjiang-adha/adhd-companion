<!DOCTYPE html><html lang="zh-CN"><head> 
  
     <meta charset="UTF-8"> 
  
     <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  
     <title>静音 - ADHD守护</title> 
  
     <script src="https://cdn.tailwindcss.com"></script> 
  
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css" /> 
  
     <style> 
  
         body { 
  
             font-family: "LXGW WenKai", sans-serif; 
  
             background-color: #F9F9F7;  
  
             color: #4A4A4A; 
  
         } 
  
  
  
         /* 欢迎语的呼吸与渐隐 */ 
  
         .welcome-text { 
  
             letter-spacing: 0.15em; line-height: 2; 
  
             animation: breathFadeIn 2.5s ease-out forwards; 
  
             transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
  
             max-height: 100px; 
  
             overflow: hidden; 
  
         } 
  
         @keyframes breathFadeIn { 
  
             0% { opacity: 0; transform: translateY(8px); } 
  
             100% { opacity: 0.6; transform: translateY(0); } 
  
         } 
  
         .welcome-text.dimmed { opacity: 0.2 !important; } 
  
         .welcome-text.hidden-collapse { opacity: 0 !important; max-height: 0; margin-bottom: 0 !important; transform: translateY(-20px); } 
  
  
  
         /* 输入框的静音质感 */ 
  
         .whisper-input { 
  
             background-color: #FFFFFF; 
  
             box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03); 
  
             border: 1px solid transparent; 
  
             outline: none; 
  
             transition: all 1s ease-in-out; 
  
         } 
  
         .whisper-input::placeholder { color: #A1A1A1; font-weight: 300; letter-spacing: 0.05em; } 
  
         .whisper-input:disabled { background-color: #FAF9F5; color: #888888; box-shadow: none; border: 1px solid #F4F2EE; } 
  
  
  
         #submitArea { transition: all 1s ease; } 
  
  
  
         /* AI 回信区 */ 
  
         .ai-response-area { 
  
             max-height: 0; opacity: 0; overflow: hidden; 
  
             transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1); 
  
         } 
  
         .ai-response-area.expanded { 
  
             max-height: 2000px;  
  
             opacity: 1; margin-top: 2rem; 
  
         } 
  
         .typing-cursor::after { content: '...'; animation: pulse 1.5s infinite; color: #8BA88E; } 
  
  
  
         /* 弹窗毛玻璃效果 */ 
  
         .glass-modal { 
  
             background: rgba(249, 249, 247, 0.85); 
  
             backdrop-filter: blur(8px); 
  
             -webkit-backdrop-filter: blur(8px); 
  
             transition: opacity 0.8s ease; 
  
         } 
  
  
  
         ::-webkit-scrollbar { display: none; } 
  
     </style></head><body class="min-h-screen flex flex-col items-center py-16 px-6 sm:px-12 relative overflow-y-auto"> 
  
      
  
     <div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-[#F2E2DF]/20 to-transparent pointer-events-none"></div> 
  
  
  
     <div id="onboardingModal" class="fixed inset-0 z-50 glass-modal flex items-center justify-center opacity-0 pointer-events-none"> 
  
         <div class="bg-white p-10 sm:p-14 rounded-3xl shadow-[0_20px_60px_-15px_rgba(0,0,0,0.05)] border border-[#F4F2EE] w-full max-w-lg transform translate-y-4 transition-transform duration-800" id="modalCard"> 
  
             <h2 class="text-2xl text-[#4A4A4A] mb-3 tracking-wide text-center">初次见面</h2> 
  
             <p class="text-[#888888] text-sm tracking-widest text-center mb-10 leading-loose"> 
  
                 在开始这段旅程前，<br>让我们稍微了解一下你的小探险家。 
  
             </p> 
  
              
  
             <div class="space-y-8"> 
  
                 <div> 
  
                     <label class="block text-sm text-[#BDBDBD] mb-2 tracking-widest">怎么称呼这个小家伙？</label> 
  
                     <input type="text" id="childName" placeholder="例如：浩浩 / 妹妹" class="w-full bg-[#FAF9F5] border-none rounded-xl px-5 py-4 text-[#5C5C5C] focus:ring-2 focus:ring-[#8BA88E]/30 outline-none transition-all"> 
  
                 </div> 
  
                 <div> 
  
                     <label class="block text-sm text-[#BDBDBD] mb-2 tracking-widest">Ta最让你头疼又好笑的一个特质是？</label> 
  
                     <input type="text" id="childTrait" placeholder="例如：永远在动 / 拼乐高专注但写字喊累" class="w-full bg-[#FAF9F5] border-none rounded-xl px-5 py-4 text-[#5C5C5C] focus:ring-2 focus:ring-[#8BA88E]/30 outline-none transition-all"> 
  
                 </div> 
  
             </div> 
  
  
  
             <div class="mt-12 text-center"> 
  
                 <button onclick="saveProfile()" class="bg-[#8BA88E] text-white px-10 py-3.5 rounded-full text-sm tracking-widest hover:shadow-lg hover:-translate-y-1 transition-all duration-300"> 
  
                     开启守护日记 
  
                 </button> 
  
             </div> 
  
         </div> 
  
     </div> 
  
  
  
     <div class="w-full max-w-2xl mt-auto mb-auto transition-all duration-1000 flex flex-col" id="mainContainer"> 
  
          
  
         <div id="welcomeText" class="welcome-text text-center text-xl sm:text-2xl mb-12 sm:mb-16"> 
  
             <p>此刻，让世界静音。</p> 
  
             <p>这里，只有你自己。</p> 
  
         </div> 
  
  
  
         <div class="relative w-full transition-transform duration-1000 ease-in-out" id="inputWrapper"> 
  
             <textarea id="diaryInput" rows="5"  
  
                       class="whisper-input w-full rounded-[2rem] p-8 sm:p-12 text-[19px] text-[#5C5C5C] leading-loose resize-none pb-20" 
  
                       placeholder="哪怕只是几个字也挺好的..."></textarea> 
  
              
  
             <div class="absolute bottom-8 right-10 opacity-0 flex items-center gap-8" id="submitArea"> 
  
                 <button id="saveBtn" onclick="saveSilently()" class="text-[#BDBDBD] hover:text-[#4A4A4A] transition-colors flex items-center gap-2 text-[13px] tracking-widest"> 
  
                     <span>默默封存</span> 
  
                 </button> 
  
                 <button id="submitBtn" onclick="startAIAnalysis()" class="text-[#8BA88E] hover:text-[#4A4A4A] transition-colors flex items-center gap-2 text-[15px] tracking-widest font-medium group"> 
  
                     <span id="btnText">听听回音</span> 
  
                     <span id="btnArrow" class="text-lg group-hover:translate-x-1 transition-transform">→</span> 
  
                 </button> 
  
             </div> 
  
         </div> 
  
  
  
         <div id="responseContainer" class="ai-response-area w-full"> 
  
             <div id="responseBox" class="bg-white rounded-3xl p-8 sm:p-12 border border-[#E1E8E0] shadow-sm relative"> 
  
                 <div id="responseLabel" class="absolute top-8 left-8 flex items-center gap-2 hidden"> 
  
                     <div class="w-2 h-2 rounded-full bg-[#8BA88E] animate-pulse"></div> 
  
                     <span class="text-[#8BA88E] text-xs tracking-widest">微光回信</span> 
  
                 </div> 
  
                 <div id="outputText" class="text-[#5C5C5C] leading-loose text-[17px] text-justify mt-8 whitespace-pre-wrap"></div> 
  
             </div> 
  
              
  
             <div class="mt-8 text-center opacity-0 transition-opacity duration-1000" id="bottomNav"> 
  
                 <a href="toolkit.html" class="text-xs text-[#8BA88E] tracking-widest hover:text-[#4A4A4A] transition-colors border-b border-[#8BA88E]/30 pb-1"> 
  
                     需要物理外挂？前往工具箱 
  
                 </a> 
  
             </div> 
  
         </div> 
  
     </div> 
  
  
  
     <script> 
  
         // --- 1. 弹窗与档案管理逻辑 --- 
  
         const modal = document.getElementById('onboardingModal'); 
  
         const modalCard = document.getElementById('modalCard'); 
  
          
  
         // 页面加载时检查是否有档案 
  
         window.onload = () => { 
  
             const childName = localStorage.getItem('adhd_child_name'); 
  
             if(!childName) { 
  
                 // 如果没有名字，显示弹窗 
  
                 modal.classList.remove('opacity-0', 'pointer-events-none'); 
  
                 modalCard.classList.remove('translate-y-4'); 
  
             } 
  
         }; 
  
  
  
         // 保存档案并关闭弹窗 
  
         function saveProfile() { 
  
             const name = document.getElementById('childName').value.trim() || '孩子'; 
  
             const trait = document.getElementById('childTrait').value.trim() || '活跃'; 
  
              
  
             localStorage.setItem('adhd_child_name', name); 
  
             localStorage.setItem('adhd_child_trait', trait); 
  
              
  
             // 优雅地隐藏弹窗 
  
             modal.classList.add('opacity-0', 'pointer-events-none'); 
  
             modalCard.classList.add('translate-y-4'); 
  
         } 
  
  
  
  
  
         // --- 2. 页面交互逻辑 --- 
  
         const input = document.getElementById('diaryInput'); 
  
         const welcome = document.getElementById('welcomeText'); 
  
         const submitArea = document.getElementById('submitArea'); 
  
         const responseContainer = document.getElementById('responseContainer'); 
  
         const responseBox = document.getElementById('responseBox'); 
  
         const responseLabel = document.getElementById('responseLabel'); 
  
         const outputText = document.getElementById('outputText'); 
  
         const mainContainer = document.getElementById('mainContainer'); 
  
         const bottomNav = document.getElementById('bottomNav'); 
  
  
  
         input.addEventListener('focus', () => welcome.classList.add('dimmed')); 
  
         input.addEventListener('blur', () => { if(input.value.trim() === '') welcome.classList.remove('dimmed'); }); 
  
         input.addEventListener('input', () => { submitArea.style.opacity = input.value.trim().length > 0 ? '1' : '0'; }); 
  
  
  
         function transformStage() { 
  
             welcome.classList.add('hidden-collapse'); 
  
             input.disabled = true; 
  
             mainContainer.classList.remove('mt-auto', 'mb-auto');  
  
             mainContainer.classList.add('mt-12');  
  
             submitArea.style.opacity = '0'; 
  
             setTimeout(() => submitArea.style.display = 'none', 1000); 
  
             responseContainer.classList.add('expanded'); 
  
         } 
  
  
  
         function saveSilently() { 
  
             if(!input.value.trim()) return; 
  
             transformStage(); 
  
             responseBox.classList.replace('border-[#E1E8E0]', 'border-[#F4F2EE]'); 
  
             responseBox.classList.replace('bg-white', 'bg-[#FAF9F5]'); 
  
             outputText.classList.add('text-center', 'text-[#888888]', 'tracking-widest'); 
  
             outputText.innerHTML = "情绪已安放。<br>没有评判，只有接纳。"; 
  
             setTimeout(() => bottomNav.style.opacity = '1', 800); 
  
         } 
  
  
  
         async function startAIAnalysis() {
             const userText = input.value.trim();
             if(!userText) return;

             const submitBtn = document.querySelector('button[onclick="startAIAnalysis()"]');
             const originalText = submitBtn.innerHTML;

             // 1. 发送请求前：改变按钮文字并禁用按钮
             submitBtn.innerHTML = "微光正在汇聚，请稍候(约10-15秒)...";
             submitBtn.disabled = true;
             submitBtn.style.opacity = "0.7";

             try {
                 transformStage();
                 responseLabel.classList.remove('hidden');
                 outputText.classList.add('typing-cursor');
                 await fetchDeepSeek(userText);
             } finally {
                 // 2. 请求结束后（无论成功失败）：把按钮恢复原状
                 submitBtn.innerHTML = originalText;
                 submitBtn.disabled = false;
                 submitBtn.style.opacity = "1";
             }
         } 
  
  
  
  
  
         // --- 3. 连接 DeepSeek 的核心逻辑 ---

        async function fetchDeepSeek(text) {

            // 使用安全的后端代理，无需在前端暴露API密钥
            const API_URL = "/api/chat"; 
  
  
  
             // 从本地提取刚才填写的孩子档案，让 AI 回复更专属 
  
             const childName = localStorage.getItem('adhd_child_name') || '孩子'; 
  
             const childTrait = localStorage.getItem('adhd_child_trait') || ''; 
  
  
  
             const systemPrompt = `你是一位温柔且【极其克制】的资深心理专家，懂神经多样性（ADHD/ASD/ODD）。你正在抚慰一位精疲力尽的家长。 
 孩子叫“${childName}”，特质是“${childTrait}”。 
 
 【语法与表达红线——绝对不可违背】 
 1. 语气必须平实、接地气、像真诚的老友！绝对不要过度抒情，严禁脑补小说一样的画面细节（绝不写“胸腔炸开的怒火”等矫情废话）。 
 2. 【核心比喻贯穿法则】：全文只能挑选【一个】核心物理比喻（例如只用“电脑断电”或只用“高速赛车”）。用这同一个比喻来解释机制和给出建议，绝对不准在同一篇回复里混用多个不同领域的比喻！ 
 3. 每段完整，绝对没有丢字、吞字、错别字，主谓宾结构必须完整。比喻要完整（如“像……一样”）。语句通顺，标点正确。 
 4. 不使用任何数字序号（如1.2.3.）或加粗，自然分段。不要说“我理解你”。无需括号内的动作描写。 
 
 【核心干预逻辑（请用大白话自然融合在3-4个段落中）】 
 第一段（接住情绪）：看到家长的累和崩溃。用温柔平实的语言点出家长的疲惫，告诉他们感到火大、想要发疯是再正常不过的反应，先帮他们卸下防备。 
 第二段（神经解码）：重构归因。用“这不是单纯的（懒/故意/坏脾气），而是…”句式，配合那个唯一选定的生动比喻，解释孩子前额叶被劫持或执行功能卡顿的机制。 
 第三段（分层建议）：给出一个微小、立刻能做的物理提示或环境减法（如：走到身边轻拍肩膀、递个抱枕、给出两分钟缓冲预告等），用刚才的同一个比喻来解释这个动作的意义，搭建转换桥梁。 
 第四段（肯定力量）：在结尾用“你现在做对的一点是…”或“这本身就是一种温柔的力量”肯定家长的觉察与努力，给予他们力量。`; 
  
  
  
             try { 

                const response = await fetch(API_URL, { 

                    method: "POST", 

                    headers: { 

                        "Content-Type": "application/json"

                    }, 

                    body: JSON.stringify({ 
                         temperature: 0.5, // 稳定情绪 
                         frequency_penalty: 0, // 【绝对关键】把频率惩罚关到0，让它敢于用常用词！ 
                         presence_penalty: 0,  // 【绝对关键】把存在惩罚关到0！ 
                         messages: [ 
                             { role: "system", content: systemPrompt }, 
                             { role: "user", content: text } 
                         ] 
                     }) 

                }); 
  
  
  
                 if (!response.ok) throw new Error('网络请求失败');

                 // 一次性接收完整的 JSON 回复
                 const data = await response.json();
                 const replyText = data.choices[0].message.content;

                 // 直接把整段文字显示到页面上
                 outputText.innerHTML = replyText; 
  
             } catch (error) { 
  
                 outputText.innerHTML = "抱歉，微光暂时未能照达。请检查 API Key 是否正确填写，或稍后再试。"; 
  
                 console.error(error); 
  
             } finally { 
  
                 outputText.classList.remove('typing-cursor'); 
  
                 bottomNav.style.opacity = '1'; 
  
             } 
  
         } 
  
     </script></body></html>
