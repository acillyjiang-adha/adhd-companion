<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静音 - ADHD守护</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css" />
    <style>
        body {
            font-family: "LXGW WenKai", sans-serif;
            background-color: #F9F9F7;
            color: #4A4A4A;
        }
        .typing-cursor::after {
            content: '...';
            animation: pulse 1.5s infinite;
            color: #8BA88E;
        }
        /* 其他您需要的样式 */
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-16 px-6 sm:px-12 relative overflow-y-auto">

    <div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-[#F2E2DF]/20 to-transparent pointer-events-none"></div>

    <div id="auth-status-container" class="absolute top-5 right-5 text-sm text-[#888] z-10"></div>

    <div class="w-full max-w-2xl mt-auto mb-auto transition-all duration-1000 flex flex-col" id="mainContainer">

        <div id="welcomeText" class="text-center text-xl sm:text-2xl mb-12 sm:mb-16">
            <p>此刻，让世界静音。</p>
            <p>这里，只有你自己。</p>
        </div>

        <div class="relative w-full">
            <textarea id="diaryInput" rows="5"
                      class="w-full rounded-[2rem] p-8 sm:p-12 text-[19px] text-[#5C5C5C] leading-loose resize-none pb-20"
                      placeholder="哪怕只是几个字也挺好的..."></textarea>

            <div class="absolute bottom-8 right-10 opacity-0 flex items-center gap-8" id="submitArea">
                <button onclick="window.saveSilently()" class="text-[#BDBDBD] hover:text-[#4A4A4A]">默默封存</button>
                <button onclick="window.startAIAnalysis()" class="text-[#8BA88E] hover:text-[#4A4A4A]">听听回音 →</button>
            </div>
        </div>

        <div id="responseContainer" class="ai-response-area w-full mt-8" style="display: none;">
            <div class="bg-white rounded-3xl p-8 sm:p-12 border border-[#E1E8E0]">
                <div id="outputText" class="text-[#5C5C5C] leading-loose"></div>
            </div>
        </div>
    </div>

    <script type="module">
        // --- [REWRITE] Firebase SDK Imports ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        // --- [REWRITE] App State & Config ---
        let currentUser = null;
        let db, auth;

        const SYSTEM_PROMPT_TEMPLATE = `你是一位温柔且【极其克制】的资深心理专家，懂神经多样性（ADHD/ASD/ODD）。你正在抚慰一位精疲力尽的家长。\n\n【常规语法与表达红线】\n1. 【平实】：用词平实、温暖，不说教，不评判。\n2. 【比喻】：核心比喻必须贯穿全文。\n3. 【不吞字】：确保语句流畅。\n4. 【无序号】：坚决不使用列表。\n\n【危机干预最高指令】\n如果内容涉及自残、自杀、暴力等，立刻放弃所有分析，强制使用以下红色加粗文字报警：\n<strong style="color: #d93025;">⚠️ 安全提醒：您描述的情况已超出常规支持范畴，涉及安全。请立即寻求专业的人工危机干预。</strong>\n\n【输出格式指令】\n在所有回复的最后，另起一行，严格按以下格式追加技术标签：\n[EMOTION_TAG: {"label":"核心情绪", "color":"#十六进制色码"}]`;

        // --- [REWRITE] DOM Element Cache ---
        const dom = {};

        // --- [REWRITE] Main Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            // Cache all DOM elements at once
            dom.authContainer = document.getElementById('auth-status-container');
            dom.input = document.getElementById('diaryInput');
            dom.submitArea = document.getElementById('submitArea');
            dom.responseContainer = document.getElementById('responseContainer');
            dom.outputText = document.getElementById('outputText');

            initializeFirebase();
            bindCoreEvents();
            renderAuthUI('loading'); // Initial auth state
        });

        // --- [REWRITE] Core Logic ---

        function initializeFirebase() {
            try {
                const firebaseConfig = {
                    apiKey: "AIzaSyBcWZVUgSw0BJBxCWU0XOA_5HZAW1dzX6I",
                    authDomain: "adha-b3b4d.firebaseapp.com",
                    projectId: "adha-b3b4d",
                    storageBucket: "adha-b3b4d.appspot.com",
                    messagingSenderId: "120170656643",
                    appId: "1:120170656643:web:195e4bf6b8a7eac502bcb6"
                };
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, user => {
                    currentUser = user;
                    renderAuthUI(user);
                });
            } catch (error) {
                console.error("Firebase init failed:", error);
                renderAuthUI('offline');
            }
        }

        function bindCoreEvents() {
            dom.input.addEventListener('input', () => {
                dom.submitArea.style.opacity = dom.input.value.trim().length > 0 ? '1' : '0';
            });
        }

        // --- [REWRITE] UI Rendering (State Separation Principle) ---

        function renderAuthUI(userOrState) {
            if (!dom.authContainer) return;
            dom.authContainer.innerHTML = ''; // Clear previous state to prevent ghosting

            if (userOrState === 'loading') {
                dom.authContainer.textContent = '验证身份中...';
            } else if (userOrState === 'offline') {
                dom.authContainer.innerHTML = `<button onclick="alert('登录功能暂不可用')">我的记录 (离线)</button>`;
            } else if (userOrState) { // User object
                dom.authContainer.innerHTML = `<button onclick="window.location.href='/cards.html'">我的记录</button>`;
            } else { // No user
                dom.authContainer.innerHTML = `<button onclick="alert('请先登录')">登录</button>`;
            }
        }

        function renderChatUI(state, data) {
            if (!dom.outputText || !dom.responseContainer) return;
            
            dom.responseContainer.style.display = 'block';
            dom.outputText.classList.remove('typing-cursor');

            switch (state) {
                case 'loading':
                    dom.outputText.innerHTML = '';
                    dom.outputText.classList.add('typing-cursor');
                    break;
                case 'success':
                    dom.outputText.innerHTML = data.replace(/\n/g, '<br>');
                    break;
                case 'error':
                    dom.outputText.innerHTML = `抱歉，AI响应失败: <br><span style="color: #999;">${data}</span>`;
                    break;
            }
        }

        // --- [REWRITE] AI & Data Handling ---

        async function fetchDeepSeek(text) {
            renderChatUI('loading');

            try {
                const finalPrompt = SYSTEM_PROMPT_TEMPLATE; // Simplified for robustness

                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        messages: [{ role: "system", content: finalPrompt }, { role: "user", content: text }], 
                        stream: true 
                    })
                });

                if (!response.ok) throw new Error(`API请求失败，状态码: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let fullReply = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    fullReply += decoder.decode(value, { stream: true });
                }
                
                // [Principle #3] First, render the raw text to guarantee no blank screen
                renderChatUI('success', fullReply);

                // Now, safely attempt to parse the tag
                let cleanReply = fullReply;
                let emotionTag = null;
                const tagRegex = /\s*\[EMOTION_TAG: (\{.*?\})\]/s;
                const match = fullReply.match(tagRegex);

                if (match && match[1]) {
                    try {
                        emotionTag = JSON.parse(match[1]);
                        cleanReply = fullReply.replace(tagRegex, '').trim();
                        // If parsing succeeds, update the UI with the cleaned text
                        renderChatUI('success', cleanReply);
                    } catch (e) {
                        console.error("Emotion tag parsing failed, but raw reply is shown.", e);
                    }
                }

                // [Principle #4] Decoupled Firebase save
                if (currentUser) {
                    saveInteraction(text, cleanReply, emotionTag);
                }

            } catch (error) {
                console.error("Critical error in fetchDeepSeek:", error);
                renderChatUI('error', error.message);
            }
        }

        function saveInteraction(userInput, aiResponse, emotionTag) {
            if (!db) return; // Firebase not initialized
            try {
                const interactionRef = doc(collection(db, "users", currentUser.uid, "interactions"));
                setDoc(interactionRef, {
                    userInput,
                    aiResponse,
                    emotionTag: emotionTag || null,
                    createdAt: serverTimestamp()
                });
            } catch (error) {
                console.error("Failed to save interaction to Firestore:", error);
            }
        }

        // --- [REWRITE] Global Event Handlers ---
        window.startAIAnalysis = function() {
            const text = dom.input.value.trim();
            if (text) fetchDeepSeek(text);
        }

        window.saveSilently = function() {
            renderChatUI('success', '情绪已安放。没有评判，只有接纳。');
        }

    </script>
</body>
</html>
