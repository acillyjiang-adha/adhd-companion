<!DOCTYPE html><html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD 守护</title>

    <!-- Firebase SDK (v9 Compat Mode) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script src="./firebase-config.js" type="module"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css" /> 
  
     <style> 
  
         body { 
  
             font-family: "LXGW WenKai", sans-serif; 
  
             background-color: #F9F9F7;  
  
             color: #4A4A4A; 
  
         } 
  
  
  
         /* 欢迎语的呼吸与渐隐 */ 
  
         .welcome-text { 
  
             letter-spacing: 0.15em; line-height: 2; 
  
             animation: breathFadeIn 2.5s ease-out forwards; 
  
             transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
  
             max-height: 100px; 
  
             overflow: hidden; 
  
         } 
  
         @keyframes breathFadeIn { 
  
             0% { opacity: 0; transform: translateY(8px); } 
  
             100% { opacity: 0.6; transform: translateY(0); } 
  
         } 
  
         .welcome-text.dimmed { opacity: 0.2 !important; } 
  
         .welcome-text.hidden-collapse { opacity: 0 !important; max-height: 0; margin-bottom: 0 !important; transform: translateY(-20px); } 
  
  
  
         /* 输入框的静音质感 */ 
  
         .whisper-input { 
  
             background-color: #FFFFFF; 
  
             box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03); 
  
             border: 1px solid transparent; 
  
             outline: none; 
  
             transition: all 1s ease-in-out; 
  
         } 
  
         .whisper-input::placeholder { color: #A1A1A1; font-weight: 300; letter-spacing: 0.05em; } 
  
         .whisper-input:disabled { background-color: #FAF9F5; color: #888888; box-shadow: none; border: 1px solid #F4F2EE; } 
  
  
  
         #submitArea { transition: all 1s ease; } 
  
  
  
         /* AI 回信区 */ 
  
         .ai-response-area { 
  
             max-height: 0; opacity: 0; overflow: hidden; 
  
             transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1); 
  
         } 
  
         .ai-response-area.expanded { 
  
             max-height: 2000px;  
  
             opacity: 1; margin-top: 2rem; 
  
         } 
  
         .typing-cursor::after { content: '...'; animation: pulse 1.5s infinite; color: #8BA88E; } 
  
  
  
         /* 弹窗毛玻璃效果 */ 
  
         .glass-modal { 
  
             background: rgba(249, 249, 247, 0.85); 
  
             backdrop-filter: blur(8px); 
  
             -webkit-backdrop-filter: blur(8px); 
  
             transition: opacity 0.8s ease; 
  
         } 
  
  
  
         ::-webkit-scrollbar { display: none; } 
  
     </style></head><body class="min-h-screen flex flex-col items-center py-16 px-6 sm:px-12 relative overflow-y-auto">
    <!-- 统一的、由JS动态渲染的用户状态容器 -->
    <div id="auth-status-container" style="position: absolute; top: 20px; right: 20px; font-size: 14px; color: #888; z-index: 10;">
        <!-- 内容将由 onAuthStateChanged 动态注入 -->
    </div>

    <!-- 登录弹窗 -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/30 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96">
            <!-- 登录/注册切换 -->
            <div class="flex border-b mb-6">
                <button id="loginTab" class="flex-1 py-2 font-medium border-b-2 border-[#8BA88E] text-[#8BA88E]" onclick="setAuthMode('login')">登录</button>
                <button id="registerTab" class="flex-1 py-2 font-medium text-gray-500" onclick="setAuthMode('register')">注册</button>
            </div>

            <input id="emailInput" type="email" placeholder="请输入您的邮箱" class="w-full border p-2 rounded mb-4">
            <input id="passwordInput" type="password" placeholder="请输入密码（至少6位）" class="w-full border p-2 rounded mb-4">
            
            <div class="flex justify-end gap-4 mt-4">
                <button onclick="closeLoginModal()" class="text-[#888]">取消</button>
                <button id="authActionBtn" onclick="handleAuthAction()" class="bg-[#8BA88E] text-white px-6 py-2 rounded-lg">登录</button>
            </div>

            <p class="text-xs text-gray-400 mt-6 text-center">您的数据经过加密存储，仅用于为您生成个人微光档案，我们不会向任何第三方透露您的信息。</p>
        </div>
    </div>


 
  
      
  
     <div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-[#F2E2DF]/20 to-transparent pointer-events-none"></div> 
  
  
  
     <div id="onboardingModal" class="fixed inset-0 z-50 glass-modal flex items-center justify-center opacity-0 pointer-events-none"> 
  
         <div class="bg-white p-10 sm:p-14 rounded-3xl shadow-[0_20px_60px_-15px_rgba(0,0,0,0.05)] border border-[#F4F2EE] w-full max-w-lg transform translate-y-4 transition-transform duration-800" id="modalCard"> 
  
             <h2 class="text-2xl text-[#4A4A4A] mb-3 tracking-wide text-center">初次见面</h2> 
  
             <p class="text-[#888888] text-sm tracking-widest text-center mb-10 leading-loose"> 
  
                 在开始这段旅程前，<br>让我们稍微了解一下你的小探险家。 
  
             </p> 
  
              
  
             <div class="space-y-8"> 
  
                 <div> 
  
                     <label class="block text-sm text-[#BDBDBD] mb-2 tracking-widest">怎么称呼这个小家伙？</label> 
  
                     <input type="text" id="childName" placeholder="例如：浩浩 / 妹妹" class="w-full bg-[#FAF9F5] border-none rounded-xl px-5 py-4 text-[#5C5C5C] focus:ring-2 focus:ring-[#8BA88E]/30 outline-none transition-all"> 
  
                 </div> 
  
                 <div> 
  
                     <label class="block text-sm text-[#BDBDBD] mb-2 tracking-widest">Ta最让你头疼又好笑的一个特质是？</label> 
  
                     <input type="text" id="childTrait" placeholder="例如：永远在动 / 拼乐高专注但写字喊累" class="w-full bg-[#FAF9F5] border-none rounded-xl px-5 py-4 text-[#5C5C5C] focus:ring-2 focus:ring-[#8BA88E]/30 outline-none transition-all"> 
  
                 </div> 
  
             </div> 
  
  
  
             <div class="mt-12 text-center"> 
  
                 <button onclick="saveProfile()" class="bg-[#8BA88E] text-white px-10 py-3.5 rounded-full text-sm tracking-widest hover:shadow-lg hover:-translate-y-1 transition-all duration-300"> 
  
                     开启守护日记 
  
                 </button> 
  
             </div> 
  
         </div> 
  
     </div> 
  
  
  
     <div class="w-full max-w-2xl mt-auto mb-auto transition-all duration-1000 flex flex-col" id="mainContainer"> 
  
          
  
         <div id="welcomeText" class="welcome-text text-center text-xl sm:text-2xl mb-12 sm:mb-16"> 
  
             <p>此刻，让世界静音。</p> 
  
             <p>这里，只有你自己。</p> 
  
         </div> 
  
  
  
         <div class="relative w-full transition-transform duration-1000 ease-in-out" id="inputWrapper"> 
  
             <textarea id="diaryInput" rows="5"  
  
                       class="whisper-input w-full rounded-[2rem] p-8 sm:p-12 text-[19px] text-[#5C5C5C] leading-loose resize-none pb-20" 
  
                       placeholder="哪怕只是几个字也挺好的..."></textarea> 
  
              
  
             <div class="absolute bottom-8 right-10 opacity-0 flex items-center gap-8" id="submitArea"> 
  
                 <button id="saveBtn" onclick="saveSilently()" class="text-[#BDBDBD] hover:text-[#4A4A4A] transition-colors flex items-center gap-2 text-[13px] tracking-widest"> 
  
                     <span>默默封存</span> 
  
                 </button> 
  
                 <button id="submitBtn" onclick="startAIAnalysis()" class="text-[#8BA88E] hover:text-[#4A4A4A] transition-colors flex items-center gap-2 text-[15px] tracking-widest font-medium group"> 
  
                     <span id="btnText">听听回音</span> 
  
                     <span id="btnArrow" class="text-lg group-hover:translate-x-1 transition-transform">→</span> 
  
                 </button> 
  
             </div> 
  
         </div> 
  
  
  
         <div id="responseContainer" class="ai-response-area w-full"> 
  
             <div id="responseBox" class="bg-white rounded-3xl p-8 sm:p-12 border border-[#E1E8E0] shadow-sm relative"> 
  
                 <div id="responseLabel" class="absolute top-8 left-8 flex items-center gap-2 hidden"> 
  
                     <div class="w-2 h-2 rounded-full bg-[#8BA88E] animate-pulse"></div> 
  
                     <span class="text-[#8BA88E] text-xs tracking-widest">微光回信</span> 
  
                 </div> 
  
                 <div id="outputText" class="text-[#5C5C5C] leading-loose text-[17px] text-justify mt-8 whitespace-pre-wrap"></div> 
  
             </div> 
  
              
  
             <div id="bottomNav" class="mt-8 text-center opacity-0 transition-opacity duration-1000">
            <a href="toolkit.html" class="text-xs text-[#8BA88E] tracking-widest hover:text-[#4A4A4A] transition-colors border-b border-[#8BA88E]/30 pb-1">试试这些工具</a>
        </div>

        <!-- AI 回复后的操作按钮 -->
        <div id="actionNav" class="mt-8 text-center opacity-0 transition-opacity duration-1000 flex gap-6">
            <button onclick="saveToCards()" class="text-xs text-[#8BA88E] tracking-widest hover:text-[#4A4A4A] transition-colors border-b border-[#8BA88E]/30 pb-1">存为卡片</button>
            <button onclick="window.location.reload()" class="text-xs text-[#888] tracking-widest hover:text-[#4A4A4A] transition-colors">再聊一次</button>
        </div> 
  
             <!-- 登录后可见的功能区域 --> 
             <div id="historySection" class="hidden mt-12 w-full max-w-2xl text-center"> 
                 <div class="grid grid-cols-1 md:grid-cols-2 gap-6"> 
                     <div id="myCardsBtn" class="bg-white/50 p-6 rounded-lg cursor-pointer hover:bg-white transition-all"> 
                         <h3 class="font-medium">我的微光卡片</h3> 
                         <p class="text-sm text-[#888] mt-2">回顾每一次的倾诉与重构</p> 
                     </div> 
                     <div id="monthlyAnalysisBtn" class="bg-white/50 p-6 rounded-lg cursor-pointer hover:bg-white transition-all"> 
                         <h3 class="font-medium">生成本月微光分析</h3> 
                         <p class="text-sm text-[#888] mt-2">查看您的情绪曲线与成长</p> 
                     </div> 
                 </div> 
             </div> 
  
         </div> 
  
     </div> 
  
  
  
         <script type="module">
        // 从配置文件导入 Firebase 服务
        import { auth, db } from './firebase-config.js';

        // --- 全局变量 ---
        let currentUser = null;

        // --- DOM 元素获取 ---
        const userEntryBtn = document.getElementById('userEntryBtn');
        const userInfo = document.getElementById('userInfo');
        const userEmailDisplay = document.getElementById('userEmailDisplay');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginModal = document.getElementById('loginModal');
        const historySection = document.getElementById('historySection');
        const monthlyAnalysisBtn = document.getElementById('monthlyAnalysisBtn');
        const myCardsBtn = document.getElementById('myCardsBtn');
        const modal = document.getElementById('onboardingModal');
        const modalCard = document.getElementById('modalCard');
        const input = document.getElementById('diaryInput');
        const welcome = document.getElementById('welcomeText');
        const submitArea = document.getElementById('submitArea');
        const responseContainer = document.getElementById('responseContainer');
        const responseBox = document.getElementById('responseBox');
        const responseLabel = document.getElementById('responseLabel');
        const outputText = document.getElementById('outputText');
        const mainContainer = document.getElementById('mainContainer');
        const bottomNav = document.getElementById('bottomNav');

        // --- 核心鉴权逻辑 ---
        auth.onAuthStateChanged(user => {
            currentUser = user;
            updateUIForUser(user);
            handleSignInRedirect();
        });

        function handleSignInRedirect() {
            if (auth.isSignInWithEmailLink(window.location.href) && !currentUser) {
                let email = window.localStorage.getItem('emailForSignIn');
                if (!email) {
                    email = window.prompt('为了完成登录，请输入您的邮箱：');
                }
                auth.signInWithEmailLink(email, window.location.href)
                    .then(() => window.localStorage.removeItem('emailForSignIn'))
                    .catch(error => alert('登录失败: ' + error.message));
            }
        }

        function updateUIForUser(user) {
            const container = document.getElementById('auth-status-container');
            container.innerHTML = ''; // 彻底清空，防止重影

            if (user) {
                // 已登录状态：显示下拉菜单
                container.innerHTML = `
                    <div class="relative" id="user-menu-container">
                        <button id="userMenuBtn" class="cursor-pointer">我的记录 (已登录)</button>
                        <div id="userMenuDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-md shadow-xl z-20">
                            <a href="/cards.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">查看历史记录</a>
                            <button id="logoutBtnInsideMenu" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100">退出登录</button>
                        </div>
                    </div>
                `;

                // 为下拉菜单添加交互逻辑
                const menuBtn = document.getElementById('userMenuBtn');
                const dropdown = document.getElementById('userMenuDropdown');
                menuBtn.addEventListener('click', () => dropdown.classList.toggle('hidden'));
                document.getElementById('logoutBtnInsideMenu').addEventListener('click', () => auth.signOut());

                // 点击菜单外部关闭菜单
                document.addEventListener('click', (event) => {
                    const container = document.getElementById('user-menu-container');
                    if (container && !container.contains(event.target)) {
                        dropdown.classList.add('hidden');
                    }
                });

            } else {
                // 未登录状态：显示登录按钮
                container.innerHTML = '<button onclick="openLoginModal()" class="cursor-pointer">我的记录</button>';
            }
        }

        const loginModal = document.getElementById('loginModal');
        let authMode = 'login'; // 'login' or 'register'

        window.openLoginModal = () => loginModal.classList.remove('hidden');
        window.closeLoginModal = () => loginModal.classList.add('hidden');

        window.setAuthMode = (mode) => {
            authMode = mode;
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const authActionBtn = document.getElementById('authActionBtn');

            if (mode === 'login') {
                loginTab.classList.add('border-[#8BA88E]', 'text-[#8BA88E]');
                loginTab.classList.remove('text-gray-500');
                registerTab.classList.remove('border-[#8BA88E]', 'text-[#8BA88E]');
                registerTab.classList.add('text-gray-500');
                authActionBtn.textContent = '登录';
            } else {
                registerTab.classList.add('border-[#8BA88E]', 'text-[#8BA88E]');
                registerTab.classList.remove('text-gray-500');
                loginTab.classList.remove('border-[#8BA88E]', 'text-[#8BA88E]');
                loginTab.classList.add('text-gray-500');
                authActionBtn.textContent = '注册';
            }
        };

        window.handleAuthAction = async () => {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;

            if (!email || !password) {
                alert('邮箱和密码不能为空。');
                return;
            }

            try {
                if (authMode === 'login') {
                    await auth.signInWithEmailAndPassword(email, password);
                    console.log("登录成功！");
                } else {
                    if (password.length < 6) {
                        alert('为了您的账户安全，密码至少需要6位。');
                        return;
                    }
                    await auth.createUserWithEmailAndPassword(email, password);
                    console.log("注册成功！");
                }
                closeLoginModal();
            } catch (error) {
                // 温柔的中文错误提示
                let message = '操作失败，请稍后再试。';
                switch (error.code) {
                    case 'auth/user-not-found':
                        message = '这个邮箱还没有注册过，要不要切换到注册试试？';
                        break;
                    case 'auth/wrong-password':
                        message = '密码好像输错了，要不要再仔细检查一下？';
                        break;
                    case 'auth/email-already-in-use':
                        message = '这个邮箱已经被注册啦，直接登录吧！';
                        break;
                    case 'auth/weak-password':
                        message = '为了您的账户安全，密码至少需要6位哦。';
                        break;
                }
                alert(message);
            }
        };

        // 修复：只有在 logoutBtn 存在时才添加事件监听器
        const logoutBtnElement = document.getElementById('logoutBtn');
        if (logoutBtnElement) {
            logoutBtnElement.addEventListener('click', () => auth.signOut());
        }

        // --- 页面访问拦截 ---
        monthlyAnalysisBtn.addEventListener('click', () => {
            if (!currentUser) openLoginModal();
            else window.location.href = '/monthly-report.html';
        });

        myCardsBtn.addEventListener('click', () => {
            if (!currentUser) openLoginModal();
            else window.location.href = '/cards.html';
        });

        // --- 页面加载与交互逻辑 ---
        window.onload = () => {
            const childName = localStorage.getItem('adhd_child_name');
            if(!childName) {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                modalCard.classList.remove('translate-y-4');
            }
        };

        window.saveProfile = function() {
            const name = document.getElementById('childName').value.trim() || '孩子';
            const trait = document.getElementById('childTrait').value.trim() || '活跃';
            localStorage.setItem('adhd_child_name', name);
            localStorage.setItem('adhd_child_trait', trait);
            modal.classList.add('opacity-0', 'pointer-events-none');
            modalCard.classList.add('translate-y-4');
        }

        input.addEventListener('focus', () => welcome.classList.add('dimmed'));
        input.addEventListener('blur', () => { if(input.value.trim() === '') welcome.classList.remove('dimmed'); });
        input.addEventListener('input', () => { submitArea.style.opacity = input.value.trim().length > 0 ? '1' : '0'; });

        function transformStage() {
            welcome.classList.add('hidden-collapse');
            // input.disabled = true; // 交给 startAIAnalysis 函数管理
            mainContainer.classList.remove('mt-auto', 'mb-auto');
            mainContainer.classList.add('mt-12');
            // submitArea.style.opacity = '0'; // 不再由这里隐藏
            // setTimeout(() => submitArea.style.display = 'none', 1000); // 不再由这里隐藏
            responseContainer.classList.add('expanded');
        }

        window.saveSilently = function() {
            if(!input.value.trim()) return;
            transformStage();
            responseBox.classList.replace('border-[#E1E8E0]', 'border-[#F4F2EE]');
            responseBox.classList.replace('bg-white', 'bg-[#FAF9F5]');
            outputText.classList.add('text-center', 'text-[#888888]', 'tracking-widest');
            outputText.innerHTML = "情绪已安放。<br>没有评判，只有接纳。";
            setTimeout(() => bottomNav.style.opacity = '1', 800);
        }

        window.startAIAnalysis = async function() {
            const userText = input.value.trim();
            if(!userText) return;

            const submitBtn = document.querySelector('button[onclick="startAIAnalysis()"]');
            const originalText = submitBtn.innerHTML;

            // 1. 发送请求前：改变按钮文字并禁用按钮
            submitBtn.innerHTML = "微光正在汇聚...";
            submitBtn.disabled = true;
            input.disabled = true;

            try {
                // 转换UI，但不隐藏提交按钮
                transformStage();
                responseLabel.classList.remove('hidden');
                outputText.innerHTML = ''; // 清空旧回复
                outputText.classList.add('typing-cursor');
                await fetchDeepSeek(userText);
            } finally {
                // 2. 请求结束后：恢复按钮和输入框状态
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                input.disabled = false;
            }
        }

        window.saveToCards = function() {
            if (!currentUser) {
                openLoginModal(); // 未登录，引导登录
            } else {
                // 这里我们假设AI回复已经完成，并且数据已经存在于变量中
                const originalText = input.value.trim();
                const reframeText = outputText.innerHTML;
                // 注意：emotionTag 需要在 fetchDeepSeek 中被保存到一个全局变量中才能在这里访问
                saveInteraction(originalText, reframeText, window.latestEmotionTag);
                alert('已为您存为微光卡片。');
            }
        }

        // --- AI 对话与数据存储 ---
        async function saveInteraction(originalText, reframeText, emotionData) {
            if (!currentUser) return; // 未登录，静默返回

            try {
                await db.collection('interactions').add({
                    uid: currentUser.uid,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    original_text: originalText,
                    reframe_text: reframeText,
                    emotion_label: emotionData ? emotionData.label : '未知',
                    emotion_color: emotionData ? emotionData.color : '#888888',
                });
            } catch (error) {
                console.error("Firestore 写入失败: ", error);
            }
        }

        async function fetchDeepSeek(text) {
            const API_URL = "/api/chat";
            const childName = localStorage.getItem('adhd_child_name') || '孩子';
            const childTrait = localStorage.getItem('adhd_child_trait') || '';

            const systemPrompt = `你是一位温柔且【极其克制】的资深心理专家，懂神经多样性（ADHD/ASD/ODD）。你正在抚慰一位精疲力尽的家长。 
 
 孩子叫“${childName}”，特质是“${childTrait}”。 
 
 
 
 【⚠️ 危机干预最高指令——涉及生命安全时无条件触发】 
 
 如果家长描述的内容包含以下任何一种极端情况： 
 
 - 孩子有自残、自杀的言语或行为。 
 
 - 孩子对他人使用严重的致命暴力或持械。 
 
 - 家长本人表达了想要伤害自己、轻生或伤害他人的念头。

                let rawReply = data.choices[0].message.content;

                let emotionTag = null;
                const tagRegex = /\s*\[EMOTION_TAG: (\{.*?\})\]/;
                const match = rawReply.match(tagRegex);

                if (match && match[1]) {
                    try {
                        emotionTag = JSON.parse(match[1]);
                        window.latestEmotionTag = emotionTag; // 保存到全局变量
                        // 从UI上彻底删除技术标签
                        rawReply = rawReply.replace(tagRegex, '').trim();
                    } catch (e) {
                        console.error("情绪标签解析失败: ", e);
                        window.latestEmotionTag = null;
                    }
                } else {
                    window.latestEmotionTag = null;
                }

                // 渲染干净的回复到页面
                outputText.innerHTML = rawReply;
                
                // 将解析出的数据传递给存储函数
