<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API测试 - ADHD守护</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        .info { background: #d1ecf1; border-color: #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
 <a href="index.html" style="position: absolute; top: 20px; left: 20px; text-decoration: none; color: #888; font-size: 14px; display: flex; align-items: center; gap: 5px; transition: color 0.3s;" onmouseover="this.style.color='#333'" onmouseout="this.style.color='#888'"> 
     <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 
     回到主页 
 </a>
    <div class="container">
        <h1>🔍 API连接诊断工具</h1>
        <p>这个页面将帮助您诊断API连接问题</p>
        
        <div class="test-section info">
            <h3>📋 测试环境信息</h3>
            <div id="env-info"></div>
        </div>
        
        <div class="test-section">
            <h3>🎯 测试1: 后端代理连接</h3>
            <button onclick="testBackendProxy()">测试 /api/chat</button>
            <div id="test1-result"></div>
        </div>
        
        <div class="test-section">
            <h3>🌐 测试2: 直接DeepSeek连接</h3>
            <button onclick="testDirectConnection()">测试直接连接</button>
            <div id="test2-result"></div>
        </div>
        
        <div class="test-section">
            <h3>📊 测试结果汇总</h3>
            <div id="summary"></div>
        </div>
    </div>

    <script>
        // 显示环境信息
        function showEnvInfo() {
            const info = {
                '当前URL': window.location.href,
                '协议': window.location.protocol,
                '主机': window.location.host,
                'User-Agent': navigator.userAgent,
                '时间': new Date().toLocaleString('zh-CN')
            };
            
            let html = '<table>';
            for (let [key, value] of Object.entries(info)) {
                html += `<tr><td><strong>${key}:</strong></td><td>${value}</td></tr>`;
            }
            html += '</table>';
            document.getElementById('env-info').innerHTML = html;
        }

        // 测试后端代理
        async function testBackendProxy() {
            const resultDiv = document.getElementById('test1-result');
            resultDiv.innerHTML = '<p>🔄 正在测试后端代理...</p>';
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        messages: [
                            { role: 'system', content: '你是一个测试助手' },
                            { role: 'user', content: '测试连接' }
                        ]
                    })
                });
                
                const statusCode = response.status;
                const statusText = response.statusText;
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <p>✅ 后端代理连接成功！</p>
                            <p>状态码: ${statusCode} ${statusText}</p>
                            <p>响应头:</p>
                            <pre>${JSON.stringify(Object.fromEntries(response.headers.entries()), null, 2)}</pre>
                        </div>
                    `;
                } else {
                    const errorText = await response.text().catch(() => '无法读取错误信息');
                    resultDiv.innerHTML = `
                        <div class="error">
                            <p>❌ 后端代理连接失败</p>
                            <p>状态码: ${statusCode} ${statusText}</p>
                            <p>错误信息: ${errorText}</p>
                            <p>响应头:</p>
                            <pre>${JSON.stringify(Object.fromEntries(response.headers.entries()), null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <p>❌ 网络错误</p>
                        <p>错误类型: ${error.name}</p>
                        <p>错误信息: ${error.message}</p>
                        <p>这通常表示后端服务未运行或URL不正确</p>
                    </div>
                `;
            }
        }

        // 测试直接连接（仅用于对比）
        async function testDirectConnection() {
            const resultDiv = document.getElementById('test2-result');
            resultDiv.innerHTML = '<p>🔄 正在测试直接连接...</p>';
            
            try {
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer sk-test-key'
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            { role: 'system', content: '你是一个测试助手' },
                            { role: 'user', content: '测试连接' }
                        ]
                    })
                });
                
                const statusCode = response.status;
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <p>✅ 直接连接成功！</p>
                            <p>状态码: ${statusCode}</p>
                            <p>（注意：这只是测试，实际应该使用后端代理）</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <p>❌ 直接连接失败</p>
                            <p>状态码: ${statusCode}</p>
                            <p>这是预期的，因为使用了测试密钥</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <p>❌ 直接连接失败</p>
                        <p>错误: ${error.message}</p>
                        <p>（这是预期的，因为可能有CORS限制）</p>
                    </div>
                `;
            }
        }

        // 显示总结
        function showSummary() {
            const summary = document.getElementById('summary');
            summary.innerHTML = `
                <div class="info">
                    <h4>🔧 常见问题排查指南</h4>
                    <ol>
                        <li><strong>404错误</strong>：检查Vercel部署是否成功，确认api/chat.js文件存在</li>
                        <li><strong>401错误</strong>：检查Vercel环境变量DEEPSEEK_API_KEY是否设置正确</li>
                        <li><strong>500错误</strong>：检查Vercel函数日志，可能是API密钥问题</li>
                        <li><strong>网络错误</strong>：确认域名和HTTPS设置正确</li>
                    </ol>
                    <p><strong>下一步：</strong>请在Vercel控制台查看函数日志获取详细错误信息</p>
                </div>
            `;
        }

        // 页面加载时执行
        window.onload = function() {
            showEnvInfo();
            showSummary();
        };
    </script>
</body>
</html>
